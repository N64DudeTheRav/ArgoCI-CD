apiVersion: apps/v1
kind: Deployment
metadata:
  name: weerservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weerservice
  template:
    metadata:
      labels:
        app: weerservice
    spec:
      containers:
        - name: weerservice
          image: ghcr.io/tropometrics/look-at-this-weather:main
          ports:
            - containerPort: 80
          
          # --- Resources are required for HPA to calculate load ---
          resources:
            requests:
              cpu: "100m"  # 0.1 CPU core
              memory: "128Mi"
            limits:
              cpu: "500m"  # 0.5 CPU core
              memory: "256Mi"
          # --------------------------------------------------------

          readinessProbe:
            httpGet:
              path: /
              port: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weerservice-backup
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weerservice
  template:
    metadata:
      labels:
        app: weerservice
    spec:
      containers:
        - name: weerservice
          image: ghcr.io/tropometrics/look-at-this-weather:main
          ports:
            - containerPort: 80
          
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 80

---
# --- ADDED: Autoscaling Logic ---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: weerservice-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: weerservice
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
