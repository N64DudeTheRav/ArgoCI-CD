apiVersion: apps/v1
kind: Deployment
metadata:
  name: weerservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weerservice
  template:
    metadata:
      labels:
        app: weerservice
    spec:
      containers:
        - name: weerservice
          # Updated image below
          image: n64docker/look-at-this-weather:latest
          ports:
            - containerPort: 80
         
          readinessProbe:
            httpGet:
              path: /
              port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weerservice-backup
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weerservice
  template:
    metadata:
      labels:
        app: weerservice
    spec:
      containers:
        - name: weerservice
         
          image: ghcr.io/tropometrics/look-at-this-weather:api-cached-server-4763d00
          ports:
            - containerPort: 80
        
          readinessProbe:
            httpGet:
              path: /
              port: 80
