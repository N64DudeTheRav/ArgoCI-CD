apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: weerservice-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: weerservice 
  minReplicas: 2      
  maxReplicas: 10     
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 5 # Scale up if CPU usage goes over 50% of the request
