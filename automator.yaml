apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: weerservice
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/TropoMetrics/ArgoCI-CD
    targetRevision: main
    path: weerservice
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
