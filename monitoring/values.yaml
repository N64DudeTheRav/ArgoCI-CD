kube-prometheus-stack:
  # --- ALERTMANAGER CONFIG ---
  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['job']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: 'null'
        routes:
          - match:
              alertname: Watchdog
            receiver: 'null'
      receivers:
        - name: 'null'

  # --- GRAFANA CONFIG ---
  grafana:
    enabled: true
    adminPassword: "prom-operator"
    service:
      type: LoadBalancer
      
  nodeExporter:
    hostRootfs: false
