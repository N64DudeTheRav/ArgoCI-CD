kube-prometheus-stack:
  # 1. Alertmanager
  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['job']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: 'null'
        routes:
          - match:
              alertname: Watchdog
            receiver: 'null'
      receivers:
        - name: 'null'

  # 2. Grafana 
  grafana:
    enabled: true
    adminPassword: "prom-operator"
    service:
      type: LoadBalancer
      loadBalancerIP: 10.10.90.50
      annotations: {}
    grafana.ini:
      database:
        wal: true
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      fsGroup: 0

  nodeExporter:
    enabled: false
    
  prometheus:
    enabled: false   
    prometheusSpec:
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
        fsGroup: 0
      
      configReloaderResources:
        limits:
          cpu: 200m
          memory: 100Mi
        requests:
          cpu: 50m
          memory: 50Mi
          
      additionalScrapeConfigs:
        - job_name: 'alpine-host'
          scrape_interval: 15s
          static_configs:
            - targets: ['10.10.90.151:9100']
              labels:
                nodename: 'k3s-control'
                instance: 'k3s-control'
