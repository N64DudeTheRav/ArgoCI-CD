apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api
          image: ghcr.io/tropometrics/api-server:main
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: CACHE_TTL
              value: "3600"
            - name: PORT
              value: "3000"
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  annotations:
    metallb.io/address-pool: ip-pool
    metallb.universe.tf/loadBalancerIPs: 10.10.90.53
spec:
  selector:
    app: api-server
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: LoadBalancer
